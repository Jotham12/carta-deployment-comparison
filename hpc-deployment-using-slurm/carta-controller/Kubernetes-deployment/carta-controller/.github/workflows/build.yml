name: Build Project + Run Checks

on:
  push:
    branches:
      - dev
      - release/*
  pull_request:

jobs:
  build:
    name: Node ${{ matrix.node }} build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: ['20', '22', '24']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}

      - name: Install pam libs
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make build-essential libpam0g-dev

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # This currently only checks formatting, rather than also linting
      - name: Run biome to check formatting
        run: npm run checkformat

      - name: Compile TypeScript
        run: npm run prepare

      - name: Run unit tests
        run: npm run unit-test
