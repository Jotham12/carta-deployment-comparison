```yaml
apiVersion: v1
kind: ResourceQuota
metadata:
  name: carta-resource-quota
  namespace: carta
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    pods: "20"
    persistentvolumeclaims: "10"
    requests.storage: "100Gi"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: carta-limit-range
  namespace: carta
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: "500m"
        memory: "512Mi"
      default:
        cpu: "2"
        memory: "2Gi"
      min:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "4"
        memory: "4Gi"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: carta-backend-config
  namespace: carta
data:
  enable_scripting: "false"
  exit_timeout: "0"
  idle_timeout: "14400"
  initial_timeout: "30"
  omp_threads: "8"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: carta-controller-role
  namespace: carta
rules:
  - apiGroups: [""]
    resources:
      - pods
    verbs:
      - get
      - list
      - create
      - delete
  - apiGroups: [""]
    resources:
      - pods/log
    verbs:
      - get
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: carta-controller-sa
  namespace: carta
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: carta-controller-role-binding
  namespace: carta
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: carta-controller-role
subjects:
  - kind: ServiceAccount
    name: carta-controller-sa
    namespace: carta
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carta-controller
  namespace: carta
  labels:
    app: carta-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carta-controller
  template:
    metadata:
      labels:
        app: carta-controller
    spec:
      serviceAccountName: carta-controller-sa
      nodeSelector:
        carta-role: backend
      containers:
        - name: carta-controller
          image: sjotham/carta-controller:k8s-test
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
          args:
            - sed -i 's/"--starting_folder", "${username}", //; s/"--starting_folder", username, //' /opt/carta-controller/dist/podHandlers.js && exec /usr/bin/carta-controller
          env:
            - name: K8S_NAMESPACE
              value: "carta"
            - name: K8S_IMAGES_PVC
              value: "cephfs-images-pvc"
            - name: CARTA_CONFIG
              value: "/etc/carta/config.json"
            - name: K8S_BACKEND_IMG
              value: "quay.io/aikema/carta_k8s_backend"
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            privileged: true
          volumeMounts:
            - name: carta-config
              mountPath: /etc/carta
            - name: nss-extrausers
              mountPath: /var/lib/extrausers
            - name: carta-host-keys
              mountPath: /carta-host-keys
            - name: nsswitch
              mountPath: /etc/nsswitch.conf
              subPath: nsswitch.conf
      volumes:
        - name: nsswitch
          configMap:
            name: nsswitch-conf
            items:
              - key: nsswitch.conf
                path: nsswitch.conf
        - name: carta-config
          secret:
            secretName: carta-config
        - name: carta-host-keys
          hostPath:
            path: /etc/carta
            type: Directory
        - name: nss-extrausers
          secret:
            secretName: carta-extrausers
            defaultMode: 0644
---
apiVersion: v1
kind: Service
metadata:
  name: controller-service
  namespace: carta
spec:
  selector:
    app: carta-controller
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
```

